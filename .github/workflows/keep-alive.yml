name: Keep apps awake

# 12時間に1回、4アプリ全部を ping してスリープを防ぐ。
# - cron は UTC。JST 9:00 と 21:00 に発火する設定。
# - workflow_dispatch で手動実行も可能。
# - リクエストが届いた時点で Streamlit は起き始めるので、
#   curl の終了コードは無視する（リダイレクト過多 = exit 47 等は無害）。

on:
  schedule:
    - cron: "0 0,12 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping all apps (ignore curl exit codes)
        run: |
          ping_url () {
            local label="$1"
            local url="$2"
            local code
            code=$(curl -sS -L --max-redirs 3 --max-time 60 \
                        -o /dev/null -w "%{http_code}" "$url" \
                   || echo "redirect-or-error")
            echo "${label}: ${code}"
          }
          ping_url "Hub      " "https://app-public-qpy8b2ziwgdf9h2vmu5hqp.streamlit.app/"
          ping_url "Mood     " "https://mood-tracker-public-exqvwdkagbgt3gk4mlmu6f.streamlit.app/"
          ping_url "CBT      " "https://cbt-bot-public-lxcmvrmdys9s3hfg6w2r7l.streamlit.app/"
          ping_url "Assertion" "https://assertion-bot-public-7yjqhpnvshkdkj7avedrml.streamlit.app/"
          # ping を送ること自体が目的なので、結果に関わらず success
          exit 0
