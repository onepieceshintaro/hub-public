name: Keep apps awake

# Playwright で実ブラウザを起動し、各アプリを「ユーザーがアクセスした」状態にする。
# Streamlit Community Cloud のスリープ判定は WebSocket セッションが基準なので、
# curl の HTTP ping だけでは効果が薄い。Playwright なら確実にセッションが作られる。
#
# - cron: UTC で4時間ごと（JST 9/13/17/21/1/5 時）
# - workflow_dispatch: 手動実行可能
# - 1アプリ ~15-20秒、合計2分前後で完了
# - スリープ中なら "Yes, get this app back up!" ボタンを自動クリック
# - 1つのアプリで失敗しても次へ進む（fail-fast しない）

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright + Chromium
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install --with-deps chromium

      - name: Visit apps with real browser session
        run: |
          python <<'PYEOF'
          import sys
          import time
          from playwright.sync_api import sync_playwright

          URLS = [
              ("Hub      ", "https://app-public-qpy8b2ziwgdf9h2vmu5hqp.streamlit.app/"),
              ("Mood     ", "https://mood-tracker-public-exqvwdkagbgt3gk4mlmu6f.streamlit.app/"),
              ("CBT      ", "https://cbt-bot-public-lxcmvrmdys9s3hfg6w2r7l.streamlit.app/"),
              ("Assertion", "https://assertion-bot-public-7yjqhpnvshkdkj7avedrml.streamlit.app/"),
          ]

          WAKE_SELECTORS = [
              "text=Yes, get this app back up!",
              "text=Wake up this app",
              "button:has-text('Wake')",
          ]

          def visit(browser, label, url):
              ctx = browser.new_context(
                  viewport={"width": 1280, "height": 800},
                  user_agent=(
                      "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 "
                      "(KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
                  ),
              )
              page = ctx.new_page()
              try:
                  page.goto(url, timeout=120000, wait_until="domcontentloaded")

                  # スリープ中なら wake-up ボタンを押す
                  woke = False
                  for sel in WAKE_SELECTORS:
                      try:
                          loc = page.locator(sel).first
                          if loc.is_visible(timeout=3000):
                              loc.click()
                              woke = True
                              print(f"{label}: wake button clicked")
                              break
                      except Exception:
                          pass

                  # ネットワークアイドル待ち（タイムアウトは無視）
                  try:
                      page.wait_for_load_state("networkidle", timeout=120000)
                  except Exception:
                      pass

                  # WebSocket セッションを十分に維持する
                  time.sleep(12 if woke else 8)

                  print(f"{label}: OK  (woke={woke})")
              except Exception as e:
                  print(f"{label}: ERROR {type(e).__name__}: {e}", file=sys.stderr)
              finally:
                  try:
                      ctx.close()
                  except Exception:
                      pass

          with sync_playwright() as p:
              browser = p.chromium.launch()
              try:
                  for label, url in URLS:
                      visit(browser, label, url)
              finally:
                  browser.close()
          PYEOF
